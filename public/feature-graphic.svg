<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060d1a"/>
      <stop offset="50%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#0a1225"/>
    </linearGradient>
    <!-- Blue glow -->
    <radialGradient id="glow1" cx="0.7" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.2" cy="0.6" r="0.4">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <!-- Water wave pattern -->
    <pattern id="waves" x="0" y="0" width="120" height="20" patternUnits="userSpaceOnUse">
      <path d="M0 10 Q30 0 60 10 Q90 20 120 10" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#glow1)"/>
  <rect width="1024" height="500" fill="url(#glow2)"/>

  <!-- Subtle wave texture at bottom -->
  <rect x="0" y="380" width="1024" height="120" fill="url(#waves)" opacity="0.5"/>

  <!-- Decorative water ripples -->
  <ellipse cx="800" cy="420" rx="180" ry="8" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.4"/>
  <ellipse cx="780" cy="440" rx="140" ry="6" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.3"/>
  <ellipse cx="820" cy="455" rx="100" ry="5" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.2"/>

  <!-- Sparkle dots scattered -->
  <circle cx="680" cy="90" r="3" fill="#38bdf8" opacity="0.5"/>
  <circle cx="920" cy="140" r="2" fill="#38bdf8" opacity="0.4"/>
  <circle cx="750" cy="180" r="2.5" fill="#60a5fa" opacity="0.3"/>
  <circle cx="950" cy="300" r="2" fill="#38bdf8" opacity="0.3"/>
  <circle cx="100" cy="80" r="2" fill="#38bdf8" opacity="0.3"/>
  <circle cx="500" cy="60" r="2" fill="#60a5fa" opacity="0.25"/>

  <!-- Map pin icons (decorative, right side) -->
  <!-- Pin 1 -->
  <g transform="translate(720, 120)" opacity="0.2">
    <path d="M0-20 C-11-20-20-11-20 0 C-20 11 0 30 0 30 C0 30 20 11 20 0 C20-11 11-20 0-20Z" fill="#38bdf8"/>
    <circle cx="0" cy="-2" r="7" fill="#0c1a2e"/>
  </g>
  <!-- Pin 2 -->
  <g transform="translate(880, 200)" opacity="0.15">
    <path d="M0-16 C-9-16-16-9-16 0 C-16 9 0 24 0 24 C0 24 16 9 16 0 C16-9 9-16 0-16Z" fill="#60a5fa"/>
    <circle cx="0" cy="-1" r="5.5" fill="#0c1a2e"/>
  </g>
  <!-- Pin 3 -->
  <g transform="translate(780, 300)" opacity="0.12">
    <path d="M0-14 C-8-14-14-8-14 0 C-14 8 0 21 0 21 C0 21 14 8 14 0 C14-8 8-14 0-14Z" fill="#38bdf8"/>
    <circle cx="0" cy="-1" r="5" fill="#0c1a2e"/>
  </g>

  <!-- Small fish silhouettes (decorative) -->
  <g transform="translate(650, 380) scale(0.7)" opacity="0.12">
    <path d="M0 0 C10-15 30-15 40 0 C30 15 10 15 0 0Z M40 0 L50-8 L50 8Z" fill="#38bdf8"/>
  </g>
  <g transform="translate(850, 350) scale(0.5)" opacity="0.08">
    <path d="M0 0 C10-15 30-15 40 0 C30 15 10 15 0 0Z M40 0 L50-8 L50 8Z" fill="#60a5fa"/>
  </g>

  <!-- Hook icon (from app logo, left area) -->
  <g transform="translate(60, 100) scale(0.55)">
    <!-- Glow behind hook -->
    <circle cx="255" cy="250" r="160" fill="#1e3a5f" opacity="0.25"/>
    <!-- Hook body -->
    <path d="M 200 120 C 200 120 310 120 310 200 C 310 270 255 290 255 330 C 255 370 285 390 310 380"
          fill="none" stroke="#60a5fa" stroke-width="22" stroke-linecap="round"/>
    <!-- Hook barb -->
    <path d="M 310 380 C 335 370 340 350 320 345"
          fill="none" stroke="#60a5fa" stroke-width="18" stroke-linecap="round"/>
    <!-- Line -->
    <line x1="200" y1="80" x2="200" y2="120" stroke="#93c5fd" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <!-- Sparkles -->
    <circle cx="355" cy="165" r="6" fill="#38bdf8" opacity="0.6"/>
    <circle cx="375" cy="195" r="4" fill="#38bdf8" opacity="0.4"/>
  </g>

  <!-- App name -->
  <text x="310" y="195" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="-1">
    <tspan fill="#60a5fa">Hook</tspan><tspan fill="white"> Line</tspan>
  </text>

  <!-- Tagline -->
  <text x="312" y="245" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="500" font-size="26" fill="#94a3b8" letter-spacing="0.5">
    Find Your Next Fishing Spot
  </text>

  <!-- Feature pills -->
  <!-- Pill 1: Map -->
  <g transform="translate(312, 280)">
    <rect width="130" height="36" rx="18" fill="#1e3a5f" opacity="0.5"/>
    <rect width="130" height="36" rx="18" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    <text x="40" y="23" font-family="system-ui, sans-serif" font-weight="600" font-size="13" fill="#93c5fd">Spot Map</text>
    <!-- Map pin mini icon -->
    <g transform="translate(18, 10)">
      <path d="M0-6 C-4-6-6-4-6 0 C-6 3 0 9 0 9 C0 9 6 3 6 0 C6-4 4-6 0-6Z" fill="#60a5fa" transform="translate(0,4)"/>
    </g>
  </g>
  <!-- Pill 2: Log -->
  <g transform="translate(455, 280)">
    <rect width="140" height="36" rx="18" fill="#1e3a5f" opacity="0.5"/>
    <rect width="140" height="36" rx="18" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    <text x="38" y="23" font-family="system-ui, sans-serif" font-weight="600" font-size="13" fill="#93c5fd">Catch Log</text>
    <!-- Fish mini icon -->
    <g transform="translate(20, 18) scale(0.35)">
      <path d="M0 0 C8-12 24-12 32 0 C24 12 8 12 0 0Z M32 0 L40-6 L40 6Z" fill="#60a5fa"/>
    </g>
  </g>
  <!-- Pill 3: Community -->
  <g transform="translate(608, 280)">
    <rect width="155" height="36" rx="18" fill="#1e3a5f" opacity="0.5"/>
    <rect width="155" height="36" rx="18" fill="none" stroke="#2563eb" stroke-width="1" opacity="0.3"/>
    <text x="38" y="23" font-family="system-ui, sans-serif" font-weight="600" font-size="13" fill="#93c5fd">Community</text>
    <!-- People mini icon -->
    <g transform="translate(18, 12)" fill="#60a5fa">
      <circle cx="0" cy="0" r="4"/>
      <circle cx="10" cy="0" r="4"/>
      <path d="M-6 10 Q-6 5 0 5 Q6 5 6 10" />
      <path d="M4 10 Q4 5 10 5 Q16 5 16 10" />
    </g>
  </g>

  <!-- Subtitle -->
  <text x="312" y="365" font-family="system-ui, sans-serif" font-weight="400" font-size="17" fill="#64748b">
    50+ species  |  All 50 states  |  100% free
  </text>

  <!-- Thin accent line -->
  <line x1="312" y1="390" x2="600" y2="390" stroke="#2563eb" stroke-width="2" opacity="0.2" stroke-linecap="round"/>

  <!-- Bottom subtle text -->
  <text x="312" y="420" font-family="system-ui, sans-serif" font-weight="500" font-size="14" fill="#475569" letter-spacing="3">
    HOOKLINEAPP.COM
  </text>
</svg>
